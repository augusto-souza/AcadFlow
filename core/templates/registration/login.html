<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>Login - AcadFlow</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card-login {
            border-radius: 20px;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        input[type="text"], input[type="password"] {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #dee2e6;
        }
        .btn-login {
            background: #764ba2;
            border: none;
            font-weight: 600;
            padding: 12px;
        }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card card-login p-4 shadow">
                    <div class="mb-4">
                        <i class="bi bi-mortarboard-fill text-primary display-3"></i>
                        <h2 class="fw-bold mt-2">AcadFlow</h2>
                        <p class="text-muted">Gestão de TCC de forma simples</p>
                    </div>

                    {% if form.errors %}
                        <div class="alert alert-danger py-2 small">Usuário ou senha incorretos.</div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3 text-start">
                            <label class="form-label small fw-bold">Usuário</label>
                            {{ form.username }}
                        </div>
                        <div class="mb-4 text-start">
                            <label class="form-label small fw-bold">Senha</label>
                            {{ form.password }}
                        </div>
                        <button type="submit" class="btn btn-primary btn-login w-100 shadow-sm">
                            Acessar Sistema
                        </button>
                    </form>

                    <div class="mt-4 border-top pt-3">
                        <p class="small text-muted">Ainda não tem acesso? 
                            <a href="{% url 'signup' %}" class="text-decoration-none fw-bold">Crie sua conta</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
