<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>Login - AcadFlow</title>
    <style>
        /* Ajuste para que os campos do Django herdem o estilo do Bootstrap */
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: #212529;
            background-color: #fff;
            border: 1px solid #ced4da;
            border-radius: 0.375rem;
            transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
        }
        input:focus {
            border-color: #86b7fe;
            outline: 0;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
    </style>
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow-lg border-0" style="width: 400px; border-radius: 15px;">
            <div class="text-center mb-4">
                <h1 class="h3 fw-bold text-primary"><i class="bi bi-mortarboard-fill"></i> AcadFlow</h1>
                <p class="text-muted">Gestão de TCC</p>
            </div>

            {% if form.errors %}
                <div class="alert alert-danger py-2 small" role="alert">
                    Usuário ou senha incorretos.
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Usuário</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
                        {{ form.username }}
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
                        {{ form.password }}
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mt-2">
                    Acessar Sistema
                </button>
            </form>

            <hr class="my-4">

            <div class="text-center">
                <p class="mb-1 text-muted small">Não possui uma conta?</p>
                <a href="{% url 'signup' %}" class="btn btn-outline-secondary btn-sm w-100 fw-bold">
                    Criar Nova Conta
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
