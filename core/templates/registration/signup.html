<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>Criar Conta - AcadFlow</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card-signup {
            border-radius: 20px;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .signup-header {
            background: #fff;
            padding: 30px 30px 10px;
            text-align: center;
        }
        .signup-header h2 {
            font-weight: 800;
            color: #333;
            margin-bottom: 5px;
        }
        .btn-register {
            background: #764ba2;
            border: none;
            font-weight: 600;
            padding: 12px;
            transition: 0.3s;
        }
        .btn-register:hover {
            background: #5a3782;
            transform: translateY(-2px);
        }
        /* Limpando os textos de ajuda do Django */
        .helptext, .helptext ul {
            font-size: 0.75rem;
            color: #6c757d;
            margin-top: 5px;
            padding-left: 15px;
        }
        label { font-weight: 600; font-size: 0.9rem; color: #444; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card card-signup shadow">
                    <div class="signup-header">
                        <div class="mb-3 text-primary">
                            <i class="bi bi-person-plus-fill display-4"></i>
                        </div>
                        <h2>AcadFlow</h2>
                        <p class="text-muted">Crie sua conta em poucos segundos</p>
                    </div>
                    
                    <div class="card-body p-4 pt-2">
                        <form method="post" novalidate>
                            {% csrf_token %}
                            
                            {% for field in form %}
                            <div class="mb-3">
                                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                                {{ field }}
                                {% if field.help_text %}
                                    <div class="helptext">{{ field.help_text|safe }}</div>
                                {% endif %}
                                {% for error in field.errors %}
                                    <div class="text-danger small mt-1"><i class="bi bi-exclamation-circle"></i> {{ error }}</div>
                                {% endfor %}
                            </div>
                            {% endfor %}

                            <button type="submit" class="btn btn-primary btn-register w-100 mt-3 shadow-sm">
                                <i class="bi bi-check-lg"></i> Concluir Cadastro
                            </button>
                        </form>
                        
                        <div class="text-center mt-4 border-top pt-3">
                            <p class="small text-muted">Já tem uma conta? 
                                <a href="{% url 'login' %}" class="text-decoration-none fw-bold">Faça login</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
