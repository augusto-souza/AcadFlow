<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Dar Feedback</title>
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0">Feedback: {{ entrega.descricao }}</h5>
                </div>
                <div class="card-body">
                    <p><strong>Trabalho:</strong> {{ entrega.trabalho.titulo }}</p>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <div class="mt-3">
                            <button type="submit" class="btn btn-success">Salvar Comentário</button>
                            <a href="{% url 'detalhes_tcc' entrega.trabalho.id %}" class="btn btn-link text-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
