<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Dashboard - AcadFlow</title>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">AcadFlow</a>
            <div class="d-flex">
                <span class="navbar-text me-3">Olá, {{ user.username }}</span>
                <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger btn-sm">Sair</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Gestão de TCCs</h1>
            <a href="{% url 'cadastrar_tcc' %}" class="btn btn-primary">
                + Nova Proposta
            </a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Título</th>
                            <th>Aluno</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for trabalho in trabalhos %}
                        <tr>
                            <td>{{ trabalho.titulo }}</td>
                            <td>{{ trabalho.aluno.username }}</td>
                            <td>
                                <span class="badge {% if trabalho.status == 'SUBMETIDO' %}bg-warning text-dark{% else %}bg-success{% endif %}">
                                    {{ trabalho.get_status_display }}
                                </span>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="3" class="text-center text-muted">Nenhum TCC cadastrado ainda.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
