{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="glass-card card p-4">
            <h4 class="fw-bold text-center">Definir Orientador</h4>
            <p class="text-center text-muted small">Projeto: {{ tcc.titulo }}</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label fw-bold">Selecione o Professor</label>
                    <select name="orientador" class="form-select">
                        {% for professor in orientadores %}
                        <option value="{{ professor.id }}">{{ professor.get_full_name|default:professor.username }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 shadow">Confirmar Atribuição</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
